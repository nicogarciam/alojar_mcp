<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot MCP - React</title>

    <!-- React CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Babel para JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Bootstrap para estilos -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- Marked.js para renderizado de Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- DOMPurify para sanitizar HTML -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.5/purify.min.js"></script>

    <style>
        .chat-container {
            height: 100vh;
            max-width: 800px;
            margin: 20px auto;
            border: 1px solid #dee2e6;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            background: white;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            border-radius: 10px 10px 0 0;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 15px;
            padding: 12px 16px;
            border-radius: 15px;
            max-width: 80%;
            word-wrap: break-word;
        }

        .message.user {
            background: #007bff;
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 5px;
        }

        .message.assistant {
            background: white;
            border: 1px solid #e9ecef;
            margin-right: auto;
            border-bottom-left-radius: 5px;
        }

        .message-system {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            margin: 10px auto;
            text-align: center;
            max-width: 90%;
            font-size: 0.9em;
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.8em;
            margin-bottom: 5px;
            opacity: 0.8;
        }

        .tools-used {
            font-size: 0.75em;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px dashed #dee2e6;
            color: #6c757d;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 10px;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #6c757d;
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out;
        }

        @keyframes typing {

            0%,
            60%,
            100% {
                transform: translateY(0);
                opacity: 0.4;
            }

            30% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }

        .chat-input-container {
            padding: 15px;
            border-top: 1px solid #dee2e6;
            background: white;
            border-radius: 0 0 10px 10px;
        }

        .suggestions {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .suggestion-chip {
            background: #e9ecef;
            border: none;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            cursor: pointer;
            transition: all 0.2s;
        }

        .suggestion-chip:hover {
            background: #007bff;
            color: white;
        }

        /* Estilos para Markdown renderizado */
        .markdown-content h1,
        .markdown-content h2,
        .markdown-content h3 {
            margin-top: 0.5em;
            margin-bottom: 0.5em;
        }

        .markdown-content p {
            margin-bottom: 0.8em;
        }

        .markdown-content ul,
        .markdown-content ol {
            margin-bottom: 0.8em;
            padding-left: 1.5em;
        }

        .markdown-content table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1em;
        }

        .markdown-content th,
        .markdown-content td {
            border: 1px solid #dee2e6;
            padding: 6px 10px;
            text-align: left;
        }

        .markdown-content th {
            background-color: #f8f9fa;
            font-weight: 600;
        }

        .markdown-content code {
            background-color: #f8f9fa;
            padding: 2px 4px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }

        .markdown-content pre {
            background-color: #f8f9fa;
            padding: 12px;
            border-radius: 5px;
            overflow-x: auto;
            margin-bottom: 1em;
        }

        .markdown-content pre code {
            background: none;
            padding: 0;
        }

        .markdown-content blockquote {
            border-left: 4px solid #007bff;
            padding-left: 1em;
            margin-left: 0;
            color: #6c757d;
            font-style: italic;
        }
    </style>
</head>

<body>
    <div id="chat-root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        // Configurar marked para renderizado de Markdown
        marked.setOptions({
            breaks: true,
            gfm: true,
            highlight: function (code, lang) {
                // En una implementación real, podrías usar una librería de highlighting
                return code;
            }
        });

        function ChatBot() {
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const [sessionId] = useState(() => `session_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`);
            const messagesEndRef = useRef(null);

            const API_BASE = 'http://localhost:3000/api';

            const suggestions = [
                "¿Tienen disponibilidad para 2 personas este fin de semana?",
                "Necesito alojamiento para 4 personas del 15 al 20 de diciembre",
                "Quiero consultar disponibilidad en el hotel 2",
                "¿Qué alojamientos tienen para 3 personas?"
            ];

            const scrollToBottom = () => {
                messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
            };

            useEffect(() => {
                scrollToBottom();
            }, [messages]);

            useEffect(() => {
                // Mensaje de bienvenida
                setMessages([{
                    id: 'welcome',
                    role: 'system',
                    content: '¡Hola! Soy tu asistente de disponibilidad de alojamientos. ¿En qué puedo ayudarte?',
                    timestamp: new Date()
                }]);
            }, []);

            // Función para convertir Markdown a HTML seguro
            const renderMarkdown = (content) => {
                const rawMarkup = marked.parse(content);
                const sanitizedMarkup = DOMPurify.sanitize(rawMarkup);
                return { __html: sanitizedMarkup };
            };

            const sendMessage = async (messageText = null) => {
                const text = messageText || input;
                if (!text.trim() || loading) return;

                // Agregar mensaje del usuario
                const userMessage = {
                    id: `msg_${Date.now()}`,
                    role: 'user',
                    content: text,
                    timestamp: new Date()
                };

                setMessages(prev => [...prev, userMessage]);
                setInput('');
                setLoading(true);

                try {
                    const response = await fetch(`${API_BASE}/chat`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            message: text,
                            sessionId: sessionId
                        })
                    });

                    if (!response.ok) {
                        throw new Error(`Error: ${response.status}`);
                    }

                    const data = await response.json();

                    const assistantMessage = {
                        id: data.messageId,
                        role: 'assistant',
                        content: data.response,
                        timestamp: new Date(data.timestamp),
                        toolsUsed: data.toolsUsed
                    };

                    setMessages(prev => [...prev, assistantMessage]);

                } catch (error) {
                    console.error('Error:', error);

                    const errorMessage = {
                        id: `error_${Date.now()}`,
                        role: 'assistant',
                        content: '⚠️ Lo siento, hubo un error procesando tu mensaje. Por favor, intenta nuevamente.',
                        timestamp: new Date()
                    };

                    setMessages(prev => [...prev, errorMessage]);
                } finally {
                    setLoading(false);
                }
            };

            const handleSuggestionClick = (suggestion) => {
                sendMessage(suggestion);
            };

            const handleKeyPress = (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            };

            const clearChat = () => {
                setMessages([{
                    id: 'welcome',
                    role: 'system',
                    content: '¡Hola! Soy tu asistente de disponibilidad de alojamientos. ¿En qué puedo ayudarte?',
                    timestamp: new Date()
                }]);

                // Limpiar historial en el servidor
                fetch(`${API_BASE}/chat/history`, {
                    method: 'DELETE',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ sessionId: sessionId })
                }).catch(console.error);
            };

            return (
                <div className="chat-container">
                    <div className="chat-header d-flex justify-content-between align-items-center">
                        <div>
                            <h4 className="mb-0">
                                <i className="fas fa-robot me-2"></i>
                                Asistente de Disponibilidad
                            </h4>
                            <small>Consultas en tiempo real</small>
                        </div>
                        <button
                            className="btn btn-outline-light btn-sm"
                            onClick={clearChat}
                            title="Limpiar conversación"
                        >
                            <i className="fas fa-broom"></i>
                        </button>
                    </div>

                    <div className="chat-messages">
                        {messages.map((message) => (
                            <div key={message.id} className={`message ${message.role === 'user' ? 'user' :
                                message.role === 'system' ? 'message-system' : 'assistant'
                                }`}>
                                <div className="message-header">
                                    <span>
                                        {message.role === 'user' ? '👤 Tú' :
                                            message.role === 'system' ? '🤖 Asistente' : '🤖 Asistente'}
                                    </span>
                                    <span>{message.timestamp.toLocaleTimeString()}</span>
                                </div>

                                {/* Renderizar contenido según el tipo de mensaje */}
                                {message.role === 'assistant' ? (
                                    <div
                                        className="markdown-content"
                                        dangerouslySetInnerHTML={renderMarkdown(message.content)}
                                    />
                                ) : (
                                    <div>{message.content}</div>
                                )}

                                {message.toolsUsed && message.toolsUsed.length > 0 && (
                                    <div className="tools-used">
                                        <i className="fas fa-tools me-1"></i>
                                        Herramientas usadas: {message.toolsUsed.join(', ')}
                                    </div>
                                )}
                            </div>
                        ))}

                        {loading && (
                            <div className="message assistant">
                                <div className="typing-indicator">
                                    <span></span>
                                    <span></span>
                                    <span></span>
                                </div>
                            </div>
                        )}

                        <div ref={messagesEndRef} />
                    </div>

                    <div className="chat-input-container">
                        <div className="suggestions">
                            {suggestions.map((suggestion, index) => (
                                <button
                                    key={index}
                                    className="suggestion-chip"
                                    onClick={() => handleSuggestionClick(suggestion)}
                                    disabled={loading}
                                >
                                    {suggestion}
                                </button>
                            ))}
                        </div>

                        <div className="input-group">
                            <textarea
                                className="form-control"
                                placeholder="Escribe tu consulta sobre disponibilidad de alojamientos..."
                                value={input}
                                onChange={(e) => setInput(e.target.value)}
                                onKeyPress={handleKeyPress}
                                disabled={loading}
                                rows="2"
                                style={{ resize: 'none' }}
                            />
                            <button
                                className="btn btn-primary"
                                onClick={() => sendMessage()}
                                disabled={!input.trim() || loading}
                            >
                                {loading ? (
                                    <>
                                        <span className="spinner-border spinner-border-sm me-2"></span>
                                        Enviando...
                                    </>
                                ) : (
                                    <>
                                        <i className="fas fa-paper-plane me-2"></i>
                                        Enviar
                                    </>
                                )}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // Renderizar el componente
        ReactDOM.render(<ChatBot />, document.getElementById('chat-root'));
    </script>
</body>

</html>
