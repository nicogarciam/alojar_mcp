<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Flotante - Asistente Virtual</title>

    <!-- React CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Babel para JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Bootstrap para estilos -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- Marked.js para renderizado de Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- DOMPurify para sanitizar HTML -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.5/purify.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            padding: 20px;
        }

        .content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .header p {
            color: #7f8c8d;
            font-size: 1.1rem;
        }

        .events {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .event-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }

        .event-card:hover {
            transform: translateY(-5px);
        }

        .event-date {
            font-weight: bold;
            color: #3498db;
            margin-bottom: 10px;
        }

        .event-title {
            font-size: 1.2rem;
            margin-bottom: 10px;
            color: #2c3e50;
        }

        .event-description {
            color: #7f8c8d;
            font-size: 0.95rem;
        }

        /* Estilos del chatbot flotante */
        .chatbot-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .chatbot-button {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3498db, #8e44ad);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            border: none;
            font-size: 24px;
        }

        .chatbot-button:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 25px rgba(0, 0, 0, 0.3);
        }

        .chatbot-window {
            position: absolute;
            bottom: 80px;
            right: 0;
            width: 500px;
            height: 85vh;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            opacity: 0;
            transform: translateY(20px) scale(0.9);
            transition: all 0.3s ease;
        }

        .chatbot-window.open {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .chat-header {
            background: linear-gradient(135deg, #3498db, #8e44ad);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header-info h3 {
            margin: 0;
            font-size: 1.2rem;
        }

        .chat-header-info p {
            margin: 0;
            font-size: 0.8rem;
            opacity: 0.9;
        }

        .close-button {
            background: none;
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .close-button:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 15px;
            padding: 12px 16px;
            border-radius: 15px;
            max-width: 85%;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            background: #3498db;
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 5px;
        }

        .message.assistant {
            background: white;
            border: 1px solid #e9ecef;
            margin-right: auto;
            border-bottom-left-radius: 5px;
        }

        .message-system {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            margin: 10px auto;
            text-align: center;
            max-width: 90%;
            font-size: 0.9em;
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.8em;
            margin-bottom: 5px;
            opacity: 0.8;
        }

        .tools-used {
            font-size: 0.75em;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px dashed #dee2e6;
            color: #6c757d;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 10px;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #6c757d;
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out;
        }

        @keyframes typing {

            0%,
            60%,
            100% {
                transform: translateY(0);
                opacity: 0.4;
            }

            30% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }

        .chat-input-container {
            padding: 15px;
            border-top: 1px solid #dee2e6;
            background: white;
        }

        .suggestions {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 10px;
        }

        .suggestion-chip {
            background: #e9ecef;
            border: none;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
        }

        .suggestion-chip:hover {
            background: #3498db;
            color: white;
        }

        .input-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .input-group textarea {
            flex: 1;
            border: 1px solid #dee2e6;
            border-radius: 20px;
            padding: 10px 15px;
            resize: none;
            font-family: inherit;
            outline: none;
            transition: border 0.2s;
        }

        .input-group textarea:focus {
            border-color: #3498db;
        }

        .send-button {
            background: #3498db;
            color: white;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
        }

        .send-button:hover {
            background: #2980b9;
        }

        .send-button:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
        }

        /* Estilos para Markdown renderizado */
        .markdown-content h1,
        .markdown-content h2,
        .markdown-content h3 {
            margin-top: 0.5em;
            margin-bottom: 0.5em;
            font-size: 1em;
        }

        .markdown-content h1 {
            font-size: 1.2em;
        }

        .markdown-content h2 {
            font-size: 1.1em;
        }

        .markdown-content p {
            margin-bottom: 0.8em;
        }

        .markdown-content ul,
        .markdown-content ol {
            margin-bottom: 0.8em;
            padding-left: 1.5em;
        }

        .markdown-content table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1em;
            font-size: 0.9em;
        }

        .markdown-content th,
        .markdown-content td {
            border: 1px solid #dee2e6;
            padding: 6px 10px;
            text-align: left;
        }

        .markdown-content th {
            background-color: #f8f9fa;
            font-weight: 600;
        }

        .markdown-content code {
            background-color: #f8f9fa;
            padding: 2px 4px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }

        .markdown-content pre {
            background-color: #f8f9fa;
            padding: 12px;
            border-radius: 5px;
            overflow-x: auto;
            margin-bottom: 1em;
        }

        .markdown-content pre code {
            background: none;
            padding: 0;
        }

        .markdown-content blockquote {
            border-left: 4px solid #3498db;
            padding-left: 1em;
            margin-left: 0;
            color: #6c757d;
            font-style: italic;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .chatbot-window {
                width: calc(100vw - 40px);
                right: 10px;
            }

            .content {
                padding: 10px;
            }
        }
    </style>
</head>

<body>
    <div class="content">
        <div class="header">
            <h1>Hotel CasaBlanca</h1>
            <p>Tu Alojamiento preferido en Las Grutas</p>
        </div>


        <div class="header">
            <h2>¿Tienes preguntas sobre nuestros servicios?</h2>
            <p>Nuestro asistente virtual está aquí para ayudarte</p>
        </div>
    </div>

    <div id="chatbot-root"></div>

    <script type="text/babel">
        const { render } = ReactDOM;

        const { useState, useRef, useEffect } = React;

        // Configurar marked para renderizado de Markdown
        marked.setOptions({
            breaks: true,
            gfm: true,
            highlight: function (code, lang) {
                return code;
            }
        });

        function FloatingChatBot() {
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const [suggestion, setSuggestion] = useState(true);
            const [suggestions, setSuggestions] = useState([]);
            const [isOpen, setIsOpen] = useState(false);
            const [sessionId] = useState(() => `session_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`);
            const messagesEndRef = useRef(null);

            const API_BASE = 'http://localhost:3000/api';

            const initialSuggestions = [
                "¿Tienen disponibilidad para 2 personas este fin de semana?",
                "Necesito alojamiento para 4 personas del 15 al 20 de diciembre",
                "Quiero consultar disponibilidad en el hotel 2",
                "¿Qué alojamientos tienen para 3 personas?"
            ];

            const scrollToBottom = () => {
                messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
            };

            useEffect(() => {
                scrollToBottom();

            }, [messages]);

            useEffect(() => {
                setSuggestions(initialSuggestions);

                // Mensaje de bienvenida
                setMessages([{
                    id: 'welcome',
                    role: 'system',
                    content: '¡Hola! 👋 Soy Ximena. ¿En qué puedo ayudarte hoy?',
                    timestamp: new Date()
                }]);
            }, []);

            // Función para convertir Markdown a HTML seguro
            const renderMarkdown = (content) => {
                const rawMarkup = marked.parse(content);
                const sanitizedMarkup = DOMPurify.sanitize(rawMarkup);
                return { __html: sanitizedMarkup };
            };

            const sendMessage = async (messageText = null) => {
                const text = messageText || input;
                if (!text.trim() || loading) return;

                // Agregar mensaje del usuario
                const userMessage = {
                    id: `msg_${Date.now()}`,
                    role: 'user',
                    content: text,
                    timestamp: new Date()
                };

                setMessages(prev => [...prev, userMessage]);
                setInput('');
                setLoading(true);

                try {
                    const response = await fetch(`${API_BASE}/chat`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            message: text,
                            sessionId: sessionId
                        })
                    });

                    if (!response.ok) {
                        throw new Error(`Error: ${response.status}`);
                    }

                    const data = await response.json();

                    const assistantMessage = {
                        id: data.messageId,
                        role: 'assistant',
                        content: data.response,
                        timestamp: new Date(data.timestamp),
                        toolsUsed: data.toolsUsed
                    };

                    setMessages(prev => [...prev, assistantMessage]);

                } catch (error) {
                    console.error('Error:', error);

                    const errorMessage = {
                        id: `error_${Date.now()}`,
                        role: 'assistant',
                        content: '⚠️ Lo siento, hubo un error procesando tu mensaje. Por favor, intenta nuevamente.',
                        timestamp: new Date()
                    };

                    setMessages(prev => [...prev, errorMessage]);
                } finally {
                    setLoading(false);
                }
            };

            const handleSuggestionClick = (suggestion) => {
                sendMessage(suggestion);
                setSuggestion(false);
            };

            const handleKeyPress = (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            };

            const clearChat = () => {
                setMessages([{
                    id: 'welcome',
                    role: 'system',
                    content: '¡Hola! 👋 Soy Ximena, ¿En qué puedo ayudarte hoy?',
                    timestamp: new Date()
                }]);

                setSuggestion(true);

                // Limpiar historial en el servidor
                fetch(`${API_BASE}/chat/history`, {
                    method: 'DELETE',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ sessionId: sessionId })
                }).catch(console.error);
            };

            const toggleChat = () => {
                setIsOpen(!isOpen);
            };

            return (
                <div className="chatbot-container">
                    <div className={`chatbot-window ${isOpen ? 'open' : ''}`}>
                        <div className="chat-header">
                            <div className="chat-header-info">
                                <h3>Ximena</h3>
                                <p>Asistente Virtual • En línea</p>
                            </div>
                            <button className="close-button" onClick={toggleChat}>
                                <i className="fas fa-times"></i>
                            </button>
                        </div>

                        <div className="chat-messages">
                            {messages.map((message) => (
                                <div key={message.id} className={`message ${message.role === 'user' ? 'user' :
                                    message.role === 'system' ? 'message-system' : 'assistant'
                                    }`}>
                                    <div className="message-header">
                                        <span>
                                            {message.role === 'user' ? 'Tú' :
                                                message.role === 'system' ? 'Ximena' : 'Ximena'}
                                        </span>
                                        <span>{message.timestamp.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>
                                    </div>

                                    {/* Renderizar contenido según el tipo de mensaje */}
                                    {message.role === 'assistant' ? (
                                        <div
                                            className="markdown-content"
                                            dangerouslySetInnerHTML={renderMarkdown(message.content)}
                                        />
                                    ) : (
                                        <div>{message.content}</div>
                                    )}

                                    {message.toolsUsed && message.toolsUsed.length > 0 && (
                                        <div className="tools-used">
                                            <i className="fas fa-tools me-1"></i>
                                            Herramientas usadas: {message.toolsUsed.join(', ')}
                                        </div>
                                    )}
                                </div>
                            ))}

                            {loading && (
                                <div className="message assistant">
                                    <div className="typing-indicator">
                                        <span></span>
                                        <span></span>
                                        <span></span>
                                    </div>
                                </div>
                            )}

                            <div ref={messagesEndRef} />
                        </div>

                        <div className="chat-input-container">
                            {suggestion && (
                                <div className="suggestions">
                                    {suggestions.map((sugg, index) => (
                                        <button
                                            key={index}
                                            className="suggestion-chip"
                                            onClick={() => handleSuggestionClick(sugg)}
                                            disabled={loading}
                                        >
                                            {sugg}
                                        </button>
                                    ))}
                                </div>
                            )}


                            <div className="input-group">
                                <button
                                    className="send-button"
                                    onClick={() => setSuggestion(!suggestion)}
                                >
                                    {loading ? (
                                        <i className="fas fa-spinner fa-spin"></i>
                                    ) : (
                                        <i className="fa-solid fa-comment-dots"></i>
                                    )}
                                </button>
                                <textarea
                                    placeholder="Escribe tu mensaje..."
                                    value={input}
                                    onChange={(e) => setInput(e.target.value)}
                                    onKeyPress={handleKeyPress}
                                    disabled={loading}
                                    rows="1"
                                />
                                <button
                                    className="send-button"
                                    onClick={() => sendMessage()}
                                    disabled={!input.trim() || loading}
                                >
                                    {loading ? (
                                        <i className="fas fa-spinner fa-spin"></i>
                                    ) : (
                                        <i className="fas fa-paper-plane"></i>
                                    )}
                                </button>
                            </div>
                        </div>
                    </div>

                    <button className="chatbot-button" onClick={toggleChat}>
                        <i className="fas fa-comment-dots"></i>
                    </button>
                </div>
            );
        }

        // Renderizar el componente
        const container = document.getElementById('chatbot-root');
        render(<FloatingChatBot />, container);
    </script>
</body>

</html>
