<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot - Asistente Virtual</title>

    <!-- React CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Babel para JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Bootstrap para estilos -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- Marked.js para renderizado de Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- DOMPurify para sanitizar HTML -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.5/purify.min.js"></script>

    <!-- Estilos del chatbot -->
    <link rel="stylesheet" href="styles-extended.css">

    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .chatbot-page-wrapper {
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }

        .chatbot-window {
            position: static;
            width: 100%;
            height: 90vh;
            opacity: 1 !important;
            transform: none !important;
        }

        .chatbot-container {
            position: static;
        }

        .chatbot-button {
            display: none;
        }
    </style>
</head>

<body>
    <div class="chatbot-page-wrapper">
        <div id="chatbot-root"></div>
    </div>

    <!-- Importar el componente (sin tipo babel, es JavaScript puro con React.createElement) -->
    <script src="ChatbotComponent.js"></script>

    <!-- Renderizar el componente -->
    <script>
        const { render } = ReactDOM;
        const container = document.getElementById('chatbot-root');
        render(React.createElement(FloatingChatBot), container);
    </script>
</body>

</html>
